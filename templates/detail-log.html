                        <div>
                            <input type="radio" id="social-family" name="social-context" value="family" class="hidden peer">
                            <label for="social-family" class="inline-block rounded-full px-4 py-2 border border-slate-700 bg-slate-800 text-slate-300 cursor-pointer transition-all duration-200 select-none peer-checked:bg-indigo-600 peer-checked:border-indigo-500 peer-checked:text-white peer-checked:shadow-[0_0_12px_rgba(99,102,241,0.4)]">Family</label>
                        </div>
                        <div>
                            <input type="radio" id="social-alone" name="social-context" value="alone" checked class="hidden peer">
                            <label for="social-alone" class="inline-block rounded-full px-4 py-2 border border-slate-700 bg-slate-800 text-slate-300 cursor-pointer transition-all duration-200 select-none peer-checked:bg-indigo-600 peer-checked:border-indigo-500 peer-checked:text-white peer-checked:shadow-[0_0_12px_rgba(99,102,241,0.4)]">Alone</label>
                        </div>
                        <div>
                            <input type="radio" id="social-coworkers" name="social-context" value="coworkers" class="hidden peer">
                            <label for="social-coworkers" class="inline-block rounded-full px-4 py-2 border border-slate-700 bg-slate-800 text-slate-300 cursor-pointer transition-all duration-200 select-none peer-checked:bg-indigo-600 peer-checked:border-indigo-500 peer-checked:text-white peer-checked:shadow-[0_0_12px_rgba(99,102,241,0.4)]">Co-Workers</label>
                        </div>
                        <div>
                            <input type="radio" id="social-strangers" name="social-context" value="strangers" class="hidden peer">
                            <label for="social-strangers" class="inline-block rounded-full px-4 py-2 border border-slate-700 bg-slate-800 text-slate-300 cursor-pointer transition-all duration-200 select-none peer-checked:bg-indigo-600 peer-checked:border-indigo-500 peer-checked:text-white peer-checked:shadow-[0_0_12px_rgba(99,102,241,0.4)]">Strangers</label>
                        </div>
                    </div>
                <label for="locations" class="text-sm font-medium text-slate-300">(Main) Location</label>
                    <div class="flex flex-wrap justify-left gap-2">
                        <div>
                            <input type="radio" id="loc-home" name="locations" value="home" class="hidden peer">
                            <label for="loc-home" class="inline-block rounded-full px-4 py-2 border border-slate-700 bg-slate-800 text-slate-300 cursor-pointer transition-all duration-200 select-none peer-checked:bg-indigo-600 peer-checked:border-indigo-500 peer-checked:text-white peer-checked:shadow-[0_0_12px_rgba(99,102,241,0.4)]">Home</label>
                        </div>
                        <div>
                            <input type="radio" id="loc-work" name="locations" value="work" checked class="hidden peer">
                            <label for="loc-work" class="inline-block rounded-full px-4 py-2 border border-slate-700 bg-slate-800 text-slate-300 cursor-pointer transition-all duration-200 select-none peer-checked:bg-indigo-600 peer-checked:border-indigo-500 peer-checked:text-white peer-checked:shadow-[0_0_12px_rgba(99,102,241,0.4)]">Work</label>
                        </div>
                        <div>
                            <input type="radio" id="loc-outdoors" name="locations" value="outdoors" class="hidden peer">
                            <label for="loc-outdoors" class="inline-block rounded-full px-4 py-2 border border-slate-700 bg-slate-800 text-slate-300 cursor-pointer transition-all duration-200 select-none peer-checked:bg-indigo-600 peer-checked:border-indigo-500 peer-checked:text-white peer-checked:shadow-[0_0_12px_rgba(99,102,241,0.4)]">Outdoors</label>
                        </div>
                        <div>
                            <input type="radio" id="loc-transit" name="locations" value="transit" class="hidden peer">
                            <label for="loc-transit" class="inline-block rounded-full px-4 py-2 border border-slate-700 bg-slate-800 text-slate-300 cursor-pointer transition-all duration-200 select-none peer-checked:bg-indigo-600 peer-checked:border-indigo-500 peer-checked:text-white peer-checked:shadow-[0_0_12px_rgba(99,102,241,0.4)]">Transit</label>
                        </div>
                    </div>
                <label for="substances" class="text-sm font-medium text-slate-300">Substances Consumed</label>
                <div id="substances-container" class="flex flex-col gap-4">
                    <p class="text-slate-500 text-sm">Loading substances...</p>
                </div>    
                
            </div>
            <div class="bg-slate-800 rounded-xl shadow-sm p-6 w-full">
                <h2 class="text-xl font-bold mb-6">Notes</h2>
                <div class="flex flex-col gap-2">
                    <label for="notes-textarea" class="text-sm font-medium text-slate-400">Notes/Diary</label>
                    
                    <textarea 
                        id="notes-textarea" 
                        name="notes" 
                        rows="4" 
                        placeholder="How was your day? Any specific triggers or highlights?" 
                        class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200 resize-none"
                    ></textarea>
                </div>
            </div>
            <button id="save-btn" class="w-full py-4 bg-green-600 hover:bg-green-500 active:scale-95 text-white font-bold rounded-2xl shadow-lg shadow-green-500/20 transition-all duration-200 flex items-center justify-center gap-2">Save Entry!</button>
        </div>
        <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 flex items-center p-4 mb-4 w-full max-w-xs text-slate-100 bg-slate-800 rounded-2xl shadow-lg border border-slate-700 transition-all duration-300 opacity-0 pointer-events-none translate-y-4 z-50">
            <div id="toast-icon" class="inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-green-500/20 text-green-400 text-xl">
                ✅
            </div>
            <div id="toast-message" class="ml-3 text-sm font-semibold">Message goes here.</div>
        </div>
        <script type="module">
            import { supabaseClient } from "/static/js/supabaseConfig.js"
            import { toggleMenu, loadTrackingItems, showToast, getWeather, handleLogout, updateBanner} from "/static/js/baseFunctions.js"

            document.getElementById("hamburger-btn").addEventListener("click", toggleMenu);

            const sliders = ["mood", "energy", "stress", "sleep-time", "work-hours", "alcohol", "sugar", "caffeine", "meds"];

            function displaySlider(sliderId, valueId, checkboxElement) {
                let slider = document.getElementById(sliderId);
                let displayer = document.getElementById(valueId);

                if (checkboxElement.checked) {
                    slider.style.display = "block";
                    displayer.style.display = "block";
                } else {
                    slider.style.display = "none";
                    displayer.style.display = "none";

                    slider.value = 1;
                    displayer.innerText = "1 unit(s)";
                }
            }

            document.getElementById("save-btn").addEventListener("click", async function (event) {

                event.preventDefault();

                const { data: { session }} = await supabaseClient.auth.getSession();

                if (!session) {
                    window.location.href = "/login";
                    return;
                }

                let sleepQuality = document.querySelector("input[name='sleep_quality']:checked").value;
                let primaryEmotion = document.querySelector("input[name='primary-emotion']:checked").value;
                let secondaryEmotion = document.querySelector("input[name='secondary-emotion']:checked").value;
                let workPlace = document.querySelector("input[name='work-place']:checked").value;
                let socialContext = document.querySelector("input[name='social-context']:checked").value;
                let location = document.querySelector("input[name='locations']:checked").value;
                let selectedActivities = [];
                let checkedBoxes = document.querySelectorAll("input[name='activities']:checked");
                let loggedSubstances = [];
                let checkedSubstances = document.querySelectorAll("input[name='substances']:checked");

                checkedSubstances.forEach(function(box) {
                    let sliderId = box.value.replace("container-", "");
                    let slider = document.getElementById(sliderId)

                    if (slider) {
                        loggedSubstances.push({
                            id: parseInt(box.dataset.id),
                            dosage: parseInt(slider.value)
                        })
                    }
                });

                checkedBoxes.forEach(function(box) {
                    selectedActivities.push(parseInt(box.dataset.id));
                    console.log(selectedActivities)
                })

                const payload = {
                    mood: document.getElementById("mood").value,
                    energy: document.getElementById("energy").value,
                    stress: document.getElementById("stress").value,
                    sleep_quality: sleepQuality,
                    sleep_time: document.getElementById("sleep-time").value,
                    primary_emotion: primaryEmotion,
                    secondary_emotion: secondaryEmotion,
                    work_hours: document.getElementById("work-hours").value,
                    work_place: workPlace,
                    social_context: socialContext,
                    location: location,
                    notes: document.getElementById("notes-textarea").value,
                    activities: selectedActivities,
                    substances: loggedSubstances,
                };

                fetch("/save-detail-log", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${session.access_token}`
                    },
                    body: JSON.stringify(payload)
                })
                .then(async response => {
                    const data = await response.json();

                    if (!response.ok) {
                        showToast(data.message, true);
                        throw new Error(data.message);
                        setTimeout(() => {
                            window.location.href = "/";
                        }, 1500);
                        
                    };

                    return data;
                })
                .then(data => {
                    console.log("Success:", data);
                    showToast("Entry saved successfully", false);
                    setTimeout(() => {
                        window.location.href = "/";
                    }, 1500)
                    
                })
                .catch((error) => {
                    console.error("Error:", error)
                })
            })

            async function getQuickLogValues() {
                const { data: { session }} = await supabaseClient.auth.getSession();

                if (!session) {
                    window.location.href = "/login";
                    return;
                }

                try {
                    const response = await fetch("/get-quicklog-values", {
                        header: {
                            "Authorization": `Bearer ${session.access_token}`
                        }
                    })
                    const data = await response.json()
                    if (!response.ok) throw new Error(data.message)

                    document.getElementById("mood").value = data.mood_value;
                    document.getElementById("energy").value = data.energy_value;
                    document.getElementById("stress").value = data.stress_value;
                    document.getElementById("mood-value").innerText = data.mood_value;
                    document.getElementById("energy-value").innerText = data.energy_value;
                    document.getElementById("stress-value").innerText = data.stress_value;
                } catch (error) {
                    showToast("Error: " + error.message, true)
                }
            }

            window.addEventListener("DOMContentLoaded", async () => {
                const loader = document.getElementById("global-loader");
                try {
                    updateBanner();
                    await getQuickLogValues();
                    await getWeather();
                    await loadTrackingItems();
                } catch (error) {
                    console.log(error);
                    showToast("Something went wrong loading your data", true)
                } finally {
                    loader.classList.add("opacity-0", "pointer-events-none");
                    setTimeout(() => {
                        loader.remove()
                    }, 300)
                }

            });

            window.toggleMenu = toggleMenu;
            window.displaySlider = displaySlider;
            window.handleLogout = handleLogout;
        </script>
    </body>
</html>
