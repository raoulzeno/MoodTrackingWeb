            async function loadWorkViz() {
                try {

                    const { data: { session }} = await supabaseClient.auth.getSession();

                    if (!session) {
                        window.location.href = "/login";
                        return;
                    }

                    const response = await fetch("/get-work-insights", {
                        headers: {
                            "Authorization": `Bearer ${session.access_token}`
                        }
                    });
                    const backendData = await response.json();

                    const colorMap = {
                        "Mood": "rgba(99, 102, 241, 1)",
                        "Energy" : "rgba(16, 185, 129, 1)",
                        "Stress" : "rgba(244, 63, 94, 1)"
                    }

                    if (typeof backendData.insights === "string") {
                        const container = document.getElementById("work-vis").parentElement;
                        container.innerHTML = `<p class="text-slate-400 italic text-sm text-center py-10">${backendData.insights}</p>`
                        return;
                    }
                    const metricsContainer = document.getElementById("work-hours-metrics");
                    const insightHTML = `
                        <div class="mb-4 text-sm bg-slate-900/50 p-4 rounded-lg">
                            <p class="text-indigo-400 mb-1">💡 <span class="text-slate-200">${backendData.insights.mood}</span></p>
                            <p class="text-emerald-400 mb-1">⚡ <span class="text-slate-200">${backendData.insights.energy}</span></p>
                            <p class="text-rose-400">🛡️ <span class="text-slate-200">${backendData.insights.stress}</span></p>
                        </div>
                    `;
                    metricsContainer.querySelector("h3").insertAdjacentHTML("afterend", insightHTML)

                    backendData.data.datasets.forEach(dataset => {
                        const themeColor = colorMap[dataset.label];

                        dataset.backgroundColor = themeColor;

                        dataset.borderColor = themeColor.replace("0.8", "1");
                        dataset.borderWidth = 1;
                        dataset.borderRadius = 4
                    })

                    const config = {
                        type: "bar",
                        data: backendData.data,
                        options: {
                            scales: {
                                y: {
                                    grid: { color: "#334155" },
                                    ticks: { color: "#94a3b8" },
                                    title: {
                                        display: true,
                                        text: "Average Score",
                                        color: "#94a3b8",
                                        font: {
                                            size: 14,
                                            weight: "bold"
                                        }
                                    }
                                },
                                x: {
                                    grid: { display: false},
                                    ticks: {color: "#94a3b8", font: { weight: "bold" } },
                                    title: {
                                        display: true,
                                        text: "Work Hours", 
                                        color: "#94a3b8",
                                        font: {
                                            size: 14,
                                            weight: "bold"
                                        }
                                    }
                                }
                            },
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: {
                                        color: "#f8fafc",
                                        font: { family: "Montserrat", size: 14},
                                        usePointStyle: true,
                                        padding: 20
                                    }
                                },
                                tooltip: {
                                    backgroundColor: "rgba(15, 23, 42, 0.9)",
                                    titleFont: { size: 14, family: "Montserrat" },
                                    bodyFont: { size: 13, family: "Montserrat" },
                                    padding: 12,
                                    cornerRadius: 8
                                }
                            }
                        }
                    }

                    const ctx = document.getElementById("work-vis")

                    new Chart(ctx, config)

                } catch (error) {
                    console.log("Something went wrong: ", error)
                }
            }

            async function loadCalMap() {
                try {

                    const { data: {session} } = await supabaseClient.auth.getSession();

                    if (!session) {
                        window.location.href = "/login";
                        return;
                    }

                    const response = await fetch("/get-cal-month-data", {
                        headers: {
                            "Authorization": `Bearer ${session.access_token}`
                        }
                    });
                    const data = await response.json();
                    if (data.mood_objs.length === 0) {
                        console.log("No cal data found.");
                        return;
                    }

                    const yearContainer = document.getElementById("cal-year-heatmap");
                    yearContainer.innerHTML = "";

                    const dataYearOptions = {
                        source: data.mood_objs,
                        x: (datum) => new Date(datum.date),
                        y: "value"
                    }

                    const TOOLTIP_OPTIONS = [[Tooltip, {text: function (timestamp, value, dayjsDate) {
                        const moodText = value ? `Mood: ${value}/10` : "No entry";

                        const dateText = dayjsDate.format("MMMM D, YYYY");

                        return `${moodText} on ${dateText}`
                    }}]]

                    
                    for (let i=11;i>=0;i--) {
                        const monthId = `year-month-${i}`;
                        const monthDiv = document.createElement("div")
                        monthDiv.id = monthId;
                        yearContainer.appendChild(monthDiv);

                        const monthStartDate = new Date();
                        monthStartDate.setMonth(monthStartDate.getMonth() - i);

                        const calYearMonth = new CalHeatmap();
                        calYearMonth.paint({
                            itemSelector: `#${monthId}`,
                            range: 1,
                            date: { start: monthStartDate },
                            domain: {
                                type: "month",
                                sort: "asc"
                            },
                            subDomain: {
                                type: "day",
                                width: 14,
                                height: 14,
                                radius: 10
                            },
                            data: dataYearOptions,
                            theme: "dark",
                            scale: {
                                color: {
                                    type: "threshold",
                                    range: ["#f43f5e", "#fb923c", "#fbbf24", "#34d399", "#0d9488"],
                                    domain: [4, 6, 8, 9.5],
                                    empty: "#1e293b"
                                }
                            }
                        }, TOOLTIP_OPTIONS)
                    }
                    
                    const startMonthDate = new Date();
                    
                    startMonthDate.setMonth(startMonthDate.getMonth() - 1);

                    const domainMonthOptions = {
                        type: "month",
                        dynamicDimension: true,
                        sort: "asc"
                    }

                    const subDomainMonthOptions = {
                        type: "day",
                        width: 16,
                        height: 16,
                        radius: 10
                    }

                    const dataMonthOptions = {
                        source: data.mood_objs,
                        x: (datum) => new Date(datum.date),
                        y: "value"
                    }

                    const monthOptions = {
                        itemSelector: document.getElementById("cal-month-heatmap"),
                        range: 2,
                        theme: "light",
                        date: { start: startMonthDate },
                        domain: domainMonthOptions,
                        subDomain: subDomainMonthOptions,
                        verticalOrientation: false,
                        data: dataMonthOptions,
                        theme: "dark",
                        scale: {
                            color: {
                                type: "threshold",
                                range: ["#f43f5e", "#fb923c", "#fbbf24", "#34d399", "#0d9488"],
                                domain: [4, 6, 8, 9.5],
                                empty: "#1e293b"
                            }
                        }
                    };

                    
                    const calMonth = new CalHeatmap();
                    calMonth.paint(monthOptions, TOOLTIP_OPTIONS)
                    .then(result => {
                        console.log("Paint finished with options");
                    });

                } catch (error) {
                    console.log("An error occured: ", error)
                };
            }

                                    pointLabels: {

                                        font: { family: 'Montserrat', size: 13, weight: 'bold' }
                                    },
                                    ticks: {
                                        display: false, // Hides the distracting numbers on the rings
                                        stepSize: 2
                                    }
                                }
                            },
                            plugins: {
                                legend: {
                                    labels: {
                                        color: "#f8fafc",
                                        font: { family: "Montserrat", size: 14 },
                                        usePointStyle: true,
                                        padding: 20
                                    }
                                },
                                tooltip: {
                                    backgroundColor: "rgba(15, 23, 42, 0.9)",
                                    titleFont: { size: 14, family: "Montserrat" },
                                    bodyFont: { size: 13, family: "Montserrat" },
                                    padding: 12,
                                    cornerRadius: 8
                                }
                            }
                        }
                    });
                } catch (error) {
                    console.error("Error loading environment chart:", error);
                }
            }

            async function loadTrendChart() {
                try {

                    const { data: { session }} = await supabaseClient.auth.getSession();

                    if (!session) {
                        window.location.href = "/login";
                        return;
                    }

                    const response = await fetch("/get-trend-data", {
                        headers: {
                            "Authorization": `Bearer ${session.access_token}`
                        }
                    });
                    const data = await response.json();

                    if (data.labels.length === 0) {
                        console.log("No data found for the last 7 days.");
                        return;
                    }

                    const ctx = document.getElementById("trendsChart").getContext("2d");

                    new Chart(ctx, {
                        type: "line",
                        data: {
                            labels: data.labels,
                            datasets: [
                                {
                                    label: "Mood",
                                    data: data.moods,
                                    borderColor: "#6366f1",
                                    borderWidth: 3,
                                    tension: 0.4
                                },
                                {
                                    label: "Energy",
                                    data: data.energies,
                                    borderColor: "#10b981",
                                    borderWidth: 3,
                                    tension: 0.4,
                                    hidden: false
                                },
                                {
                                    label: "Stress",
                                    data: data.stress,
                                    borderColor: "#f43f5e",
                                    borderWidth: 3,
                                    tension: 0.4,
                                    hidden: true
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: {
                                mode: "index",
                                intersect: false,
                            },
                            scales: {
                                y: {
                                    min: -1,
                                    max: 11,
                                    grid: { color: "#334155" },
                                    ticks: { color: "#94a3b8" },
                                    title: {
                                        display: true,
                                        text: "Score",
                                        color: "#94a3b8",
                                        font: {
                                            size: 14,
                                            weight: "bold"
                                        }
                                    }
                                },
                                x: {
                                    grid: { display: false},
                                    ticks: {color: "#94a3b8", font: { weight: "bold" } }
                                }
                            },
                            plugins: {
                                legend: {
                                    labels: {
                                        color: "#f8fafc",
                                        font: { family: "Montserrat", size: 14},
                                        usePointStyle: true,
                                        padding: 20
                                    }
                                },
                                tooltip: {
                                    backgroundColor: "rgba(15, 23, 42, 0.9)",
                                    titleFont: { size: 14, family: "Montserrat" },
                                    bodyFont: { size: 13, family: "Montserrat" },
                                    padding: 12,
                                    cornerRadius: 8
                                }
                            }
                        }
                    });
                } catch (error) {
                    console.error("Error loading chart data:", error)
                }
            }

            function toggleMenu() {
                const menu = document.getElementById("mobile-menu");
                menu.classList.toggle("hidden");
            }


            function showToast(message, isError = false) {
                const toast = document.getElementById("toast");
                const toastMessage = document.getElementById("toast-message");
                const toastIcon = document.getElementById("toast-icon");

                toastMessage.innerText = message;

                if (isError) {
                    toastIcon.className = "inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-red-500/20 text-red-400 text-xl";
                    toastIcon.innerHTML = "❌";
                } else {
                    toastIcon.className = "inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-green-500/20 text-green-400 text-xl";
                    toastIcon.innerHTML = "✅"
                }

                toast.classList.remove("opacity-0", "translate-y-4", "pointer-events-none");
                toast.classList.add("opacity-100", "translate-y-0")

                setTimeout(() => {
                    toast.classList.remove("opacity-100", "translate-y-0");
                    toast.classList.add("opacity-0", "translate-y-4", "pointer-events-none")
                }, 3000);
            }

            window.addEventListener("DOMContentLoaded", () =>{
                loadTrendChart();
                loadEnvironmentChart();
                loadCalMap();
                loadEmotionMap();
                loadActivitiesSubstances();
                loadSleepViz();
                loadWorkViz();
            })
        </script>
    </body>
</html>
