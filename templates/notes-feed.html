<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script>
            tailwind.config = {
                theme: {
                extend: {
                    fontFamily: {
                    // This tells Tailwind to replace its default "sans" font with our new Inter font
                    sans: ['Montserrat', 'sans-serif'],
                    }
                }
                }
            }
            </script>
        <title>Mood Tracker</title>
    </head>
    <body class="bg-slate-900 text-slate-100 font-sans p-4 pt-1">
        <nav class="flex items-center justify-between p-5 w-full bg-transparent relative top-0">
            <button id="hamburger-btn" onclick="toggleMenu()" class="flex flex-col gap-1.5 focus:outline-none top-0">
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
            </button>

            <span class="text-xs uppercase tracking-widest text-slate-500 font-bold">Raoul's Tracker</span>

            <div class="w-6"></div>
        </nav>
        <div id="mobile-menu" class="hidden fixed inset-0 bg-slate-950/95 z-50 flex flex-col items-center justify-center gap-8">
            <button onclick="toggleMenu()" class="absolute top-6 left-6 text-white text-3xl">&times;</button>

            <a href="/" class="text-2xl font-bold text-white hover:text-indigo-400">Dashboard</a>
            <a href="/detail" class="text-2xl font-bold text-white hover:text-indigo-400">Detail Log</a>
            <a href="/visualizations" class="text-2xl font-bold text-white hover:text-indigo-400">Visualizations</a>
            <a href="/notes-feed" class="text-2xl font-bold text-white hover:text-indigo-400">Notes Feed</a>
        </div>
        <hr>
        <div id="notes-feed" class="flex flex-col justify-center items-center gap-4">
            <div class="self-start">
                <h2 class="text-2xl font-bold pt-5">Notes Feed</h2>
                <span class="text-xs font-semibold text-indigo-400 uppercase tracking-widest">Live Feed</span>
            </div>
            <div id="notes-container" class="flex flex-col gap-6 pb-10">
                <div class="text-slate-500 italic text-sm text-center py-10">Loading notes...</div>
            </div>
        </div>
        <script>
            const SUPABASE_URL = "https://zjyypccuhagrsjbxfipi.supabase.co"
            const SUPABASE_ANON_KEY = "sb_publishable_AP_aE9BRhq4hzpNBbsRqNw_gxAoXF67"
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

            function toggleMenu() {
                const menu = document.getElementById("mobile-menu");
                menu.classList.toggle("hidden");
            }

            async function getNotes() {
                try {

                    const {data: {session}} = await supabaseClient.auth.getSession();

                    if (!session) {
                        window.location.href = "/login";
                        return;
                    }

                    const response = await fetch("/get-notes-data", {
                        headers: {
                            "Authorization": `Bearer ${session.access_token}`
                        }
                    });
                    const backendData = await response.json();
                    const container = document.getElementById("notes-container");
                    if (backendData.data.length === 0) {
                        container.innerHTML = `<p class="text-slate-500 italic text-center py-10">No notes logged yet.</p>`;
                        return;
                    }

                    const htmlString = backendData.data.map(entry => `
                        <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700/50 shadow-sm backdrop-blur-sm">
                            <div class="flex justify-between items-start mb-3">
                                <div class="text-xs text-slate-500 font-bold uppercase tracking-widest">
                                    ${entry.date}
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="flex items-center gap-1">
                                        <span class="text-[10px] text-slate-500 uppercase font-bold">Mood</span>
                                        <span class="px-2 py-0.5 rounded bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-xs font-mono font-bold">${entry.mood}</span>
                                    </div>
                        
                                    <div class="flex items-center gap-1">
                                        <span class="text-[10px] text-slate-500 uppercase font-bold">Energy</span>
                                        <span class="px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-xs font-mono font-bold">${entry.energy}</span>
                                    </div>
                        
                                    <div class="flex items-center gap-1">
                                        <span class="text-[10px] text-slate-500 uppercase font-bold">Stress</span>
                                        <span class="px-2 py-0.5 rounded bg-rose-500/10 text-rose-400 border border-rose-500/20 text-xs font-mono font-bold">${entry.stress}</span>
                                    </div>
                                </div>       
                            </div>
                            <p class="text-slate-300 text-lg leading-relaxed">${entry.note}</p>
                        </div>
                `).join("");

                container.innerHTML = htmlString;

                } catch (error) {
                    console.log(error)
                }
                
            }
        
            window.addEventListener("DOMContentLoaded", getNotes);
        </script>
    </body>
</html>
