<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <script src="https://unpkg.com/cal-heatmap/dist/cal-heatmap.min.js"></script>
        <script src="https://unpkg.com/@popperjs/core@2"></script>
        <script src="https://unpkg.com/cal-heatmap/dist/plugins/Tooltip.min.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/cal-heatmap/dist/cal-heatmap.css">
        <script>
            tailwind.config = {
                theme: {
                extend: {
                    fontFamily: {
                    // This tells Tailwind to replace its default "sans" font with our new Inter font
                    sans: ['Montserrat', 'sans-serif'],
                    }
                }
                }
            }
            </script>
        <title>Visualizations</title>
    </head>
    <body class="bg-slate-900 text-slate-100 font-sans p-4">
        <nav class="flex items-center justify-between p-5 w-full bg-transparent relative top-0">
            <button id="hamburger-btn" class="flex flex-col gap-1.5 focus:outline-none top-0">
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
            </button>

            <span class="text-xs uppercase tracking-widest text-slate-500 font-bold">Raoul's Tracker</span>

            <div class="w-6"></div>
        </nav>
        <div id="mobile-menu" class="hidden fixed inset-0 bg-slate-950/95 z-50 flex flex-col items-center justify-center gap-8">
            <button onclick="toggleMenu()" class="absolute top-6 left-6 text-white text-3xl">&times;</button>

            <a href="/" class="text-2xl font-bold text-white hover:text-indigo-400">Dashboard</a>
            <a href="/detail" class="text-2xl font-bold text-white hover:text-indigo-400">Detail Log</a>
            <a href="/visualizations" class="text-2xl font-bold text-white hover:text-indigo-400">Visualizations</a>
        </div>
        <hr>
        <div id="visualizations" class="flex flex-col justify-center items-center gap-4">
            <div class="self-start">
                <h2 class="text-2xl font-bold pt-5">Visualizations</h2>
            </div>
            <div id="calendar" class="bg-slate-800 rounded-xl shadow-sm p-6 w-full">
                <h3 class="text-xl font-bold mb-6">Calendar</h3>
                <div id="cal-box" class="flex flex-col items-center gap-5 relative w-full">
                    <label class="inline-flex items-center cursor-pointer p-3">
                        <span class="select-none text-sm font-medium text-heading">Last 30 Days</span>
                        <input id="month-year-toggle" type="checkbox" value="" class="sr-only peer" onchange="toggleYear()">
                        <div class="relative mx-3 w-9 h-5 bg-slate-900 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-brand-soft dark:peer-focus:ring-brand-soft rounded-full peer peer-checked:after:translate-x-full peer-checkedafter:border-buffer after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-brand"></div>
                        <span class="select-none text-sm font-medium text-heading">Last Year</span>
                    </label>
                    <div id="cal-month-heatmap" class=""></div>
                    <div id="cal-year-heatmap" class="hidden flex flex-wrap gap-4 justify-center"></div>
                </div>
            </div>
            <div id="trend" class="bg-slate-800 rounded-xl shadow-sm p-6 w-full">
                <h3 class="text-xl font-bold mb-6">Weekly Trends</h3>
                <div class="relative h-[350px] w-full">
                    <canvas id="trendsChart"></canvas>
                </div>
            </div>
            <div id="sleep-quant-qual" class="bg-slate-800 rounded-xl shadow-sm p-6 w-full">
                <h3 class="text-xl font-bold mb-6">Sleep Quantity and Quality</h3>
                <div class="relative h-[350px] w-full">
                </div>
            </div>
            <div id="work-hours-metrics" class="bg-slate-800 rounded-xl shadow-sm p-6 w-full">
                <h3 class="text-xl font-bold mb-6">Work Hours Impact</h3>
                <div class="relative h-[350px] w-full">
                </div>
            </div>
            <div id="environments" class="bg-slate-800 rounded-xl shadow-sm p-6 w-full">
                <h3 class="text-xl font-bold mb-6">Environments</h3>
                <div class="relative h-[400px] w-full">
                    <canvas id="environmentChart"></canvas>
                </div>
            </div>
            <div id="activty-substance-table" class="bg-slate-800 rounded-xl shadow-sm p-6 w-full">
                <h3 class="text-xl font-bold mb-6">Activity and Substance Table</h3>
            </div>
        </div>

        <script>
            document.getElementById("hamburger-btn").addEventListener("click", toggleMenu);


            function toggleYear() {
                month = document.getElementById("cal-month-heatmap")
                year = document.getElementById("cal-year-heatmap")

                month.classList.toggle("hidden")
                year.classList.toggle("hidden")

            }

            async function loadCalMap() {
                try {
                    const response = await(fetch("/get-cal-month-data"));
                    const data = await response.json();
                    if (data.mood_objs.length === 0) {
                        console.log("No cal data found.");
                        return;
                    }

                    const yearContainer = document.getElementById("cal-year-heatmap");
                    yearContainer.innerHTML = "";

                    const dataYearOptions = {
                        source: data.mood_objs,
                        x: (datum) => new Date(datum.date),
                        y: "value"
                    }

                    const TOOLTIP_OPTIONS = [[Tooltip, {text: function (timestamp, value, dayjsDate) {
                        const moodText = value ? `Mood: ${value}/10` : "No entry";

                        const dateText = dayjsDate.format("MMMM D, YYYY");

                        return `${moodText} on ${dateText}`
                    }}]]

                    
                    for (let i=11;i>=0;i--) {
                        const monthId = `year-month-${i}`;
                        const monthDiv = document.createElement("div")
                        monthDiv.id = monthId;
                        yearContainer.appendChild(monthDiv);

                        const monthStartDate = new Date();
                        monthStartDate.setMonth(monthStartDate.getMonth() - i);

                        const calYearMonth = new CalHeatmap();
                        calYearMonth.paint({
                            itemSelector: `#${monthId}`,
                            range: 1,
                            date: { start: monthStartDate },
                            domain: {
                                type: "month",
                                sort: "asc"
                            },
                            subDomain: {
                                type: "day",
                                width: 14,
                                height: 14,
                                radius: 2
                            },
                            data: dataYearOptions,
                            theme: "dark",
                            scale: {
                                color: {
                                    type: "quantize",
                                    range: ['#ff4d4d', '#ff9933', '#ffdb4d', '#a6ff4d', '#4dff4d'],
                                    domain: [1, 10]
                                }
                            }
                        }, TOOLTIP_OPTIONS)
                    }
                    
                    const startMonthDate = new Date();
                    
                    startMonthDate.setMonth(startMonthDate.getMonth() - 1);

                    const domainMonthOptions = {
                        type: "month",
                        dynamicDimension: true,
                        sort: "asc"
                    }

                    const subDomainMonthOptions = {
                        type: "day",
                        width: 16,
                        height: 16,
                        radius: 2
                    }

                    const dataMonthOptions = {
                        source: data.mood_objs,
                        x: (datum) => new Date(datum.date),
                        y: "value"
                    }

                    const monthOptions = {
                        itemSelector: document.getElementById("cal-month-heatmap"),
                        range: 2,
                        date: { start: startMonthDate },
                        domain: domainMonthOptions,
                        subDomain: subDomainMonthOptions,
                        verticalOrientation: true,
                        data: dataMonthOptions,
                        theme: "dark",
                        scale: {
                            color: {
                                type: "quantize",
                                range: ['#ff4d4d', '#ff9933', '#ffdb4d', '#a6ff4d', '#4dff4d'],
                                domain: [1, 10]
                            }
                        }
                    };

                    
                    const calMonth = new CalHeatmap();
                    calMonth.paint(monthOptions, TOOLTIP_OPTIONS)
                    .then(result => {
                        console.log("Paint finished with options");
                    });

                } catch (error) {
                    console.log("An error occured: ", error)
                };
            }

            async function loadEnvironmentChart() {
                try {
                    const response = await fetch("/get-environments-data");
                    const data = await response.json();

                    if (data.labels.length === 0) {
                        console.log("No environment data found.");
                        return;
                    }

                    const ctx = document.getElementById("environmentChart").getContext("2d");

                    new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: data.labels, // The points of the web (Home, Work, etc.)
                            datasets: [
                                {
                                    label: 'Avg Mood',
                                    data: data.moods,
                                    backgroundColor: 'rgba(99, 102, 241, 0.2)', // Transparent Indigo
                                    borderColor: '#6366f1',
                                    pointBackgroundColor: '#6366f1',
                                    borderWidth: 2
                                },
                                {
                                    label: 'Avg Energy',
                                    data: data.energies,
                                    backgroundColor: 'rgba(16, 185, 129, 0.2)', // Transparent Emerald
                                    borderColor: '#10b981',
                                    pointBackgroundColor: '#10b981',
                                    borderWidth: 2
                                },
                                {
                                    label: 'Avg Stress',
                                    data: data.stress,
                                    backgroundColor: 'rgba(244, 63, 94, 0.2)', // Transparent Rose
                                    borderColor: '#f43f5e',
                                    pointBackgroundColor: '#f43f5e',
                                    borderWidth: 2
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                r: {
                                    min: 0,
                                    max: 10,
                                    angleLines: { color: 'rgba(148, 163, 184, 0.2)' }, // The "spokes" of the web
                                    grid: { color: 'rgba(148, 163, 184, 0.2)' }, // The rings of the web
                                    pointLabels: {
                                        color: '#f8fafc',
                                        font: { family: 'Montserrat', size: 13, weight: 'bold' }
                                    },
                                    ticks: {
                                        display: false, // Hides the distracting numbers on the rings
                                        stepSize: 2
                                    }
                                }
                            },
                            plugins: {
                                legend: {
                                    labels: {
                                        color: "#f8fafc",
                                        font: { family: "Montserrat", size: 14 },
                                        usePointStyle: true,
                                        padding: 20
                                    }
                                },
                                tooltip: {
                                    backgroundColor: "rgba(15, 23, 42, 0.9)",
                                    titleFont: { size: 14, family: "Montserrat" },
                                    bodyFont: { size: 13, family: "Montserrat" },
                                    padding: 12,
                                    cornerRadius: 8
                                }
                            }
                        }
                    });
                } catch (error) {
                    console.error("Error loading environment chart:", error);
                }
            }

            async function loadTrendChart() {
                try {
                    const response = await fetch("/get-trend-data");
                    const data = await response.json();

                    if (data.labels.length === 0) {
                        console.log("No data found for the last 7 days.");
                        return;
                    }

                    const ctx = document.getElementById("trendsChart").getContext("2d");

                    new Chart(ctx, {
                        type: "line",
                        data: {
                            labels: data.labels,
                            datasets: [
                                {
                                    label: "Mood",
                                    data: data.moods,
                                    borderColor: "#6366f1",
                                    borderWidth: 3,
                                    tension: 0.4
                                },
                                {
                                    label: "Energy",
                                    data: data.energies,
                                    borderColor: "#10b981",
                                    borderWidth: 3,
                                    tension: 0.4,
                                    hidden: false
                                },
                                {
                                    label: "Stress",
                                    data: data.stress,
                                    borderColor: "#f43f5e",
                                    borderWidth: 3,
                                    tension: 0.4,
                                    hidden: true
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: {
                                mode: "index",
                                intersect: false,
                            },
                            scales: {
                                y: {
                                    min: 0,
                                    max: 10,
                                    grid: { color: "#334155" },
                                    ticks: { color: "#94a3b8" }
                                },
                                x: {
                                    grid: { display: false},
                                    ticks: {color: "#94a3b8", font: { weight: "bold" } }
                                }
                            },
                            plugins: {
                                legend: {
                                    labels: {
                                        color: "#f8fafc",
                                        font: { family: "Montserrat", size: 14},
                                        usePointStyle: true,
                                        padding: 20
                                    }
                                },
                                tooltip: {
                                    backgroundColor: "rgba(15, 23, 42, 0.9)",
                                    titleFont: { size: 14, family: "Montserrat" },
                                    bodyFont: { size: 13, family: "Montserrat" },
                                    padding: 12,
                                    cornerRadius: 8
                                }
                            }
                        }
                    });
                } catch (error) {
                    console.error("Error loading chart data:", error)
                }
            }

            function toggleMenu() {
                const menu = document.getElementById("mobile-menu");
                menu.classList.toggle("hidden");
            }


            function showToast(message, isError = false) {
                const toast = document.getElementById("toast");
                const toastMessage = document.getElementById("toast-message");
                const toastIcon = document.getElementById("toast-icon");

                toastMessage.innerText = message;

                if (isError) {
                    toastIcon.className = "inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-red-500/20 text-red-400 text-xl";
                    toastIcon.innerHTML = "❌";
                } else {
                    toastIcon.className = "inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-green-500/20 text-green-400 text-xl";
                    toastIcon.innerHTML = "✅"
                }

                toast.classList.remove("opacity-0", "translate-y-4", "pointer-events-none");
                toast.classList.add("opacity-100", "translate-y-0")

                setTimeout(() => {
                    toast.classList.remove("opacity-100", "translate-y-0");
                    toast.classList.add("opacity-0", "translate-y-4", "pointer-events-none")
                }, 3000);
            }

            window.addEventListener("DOMContentLoaded", () =>{
                loadTrendChart();
                loadEnvironmentChart();
                loadCalMap();
            })
        </script>
    </body>
</html>
