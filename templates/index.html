<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script>
            tailwind.config = {
                theme: {
                extend: {
                    fontFamily: {
                    sans: ['Montserrat', 'sans-serif'],
                    }
                }
                }
            }
            </script>
        <title>Mood Tracker</title>
    </head>
    <body class="bg-slate-900 text-slate-100 font-sans p-3">
        <nav class="flex p-4 items-center justify-between p-3 w-full bg-transparent relative top-0">
            <button id="hamburger-btn" class="flex flex-col gap-1.5 focus:outline-none top-0">
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
            </button>

            <span id="tracker-title" class="text-xs uppercase tracking-widest text-slate-500 font-bold">Raoul's Tracker</span>

            <div class="w-6"></div>
        </nav>
        <div id="mobile-menu" class="hidden fixed inset-0 pt-3 bg-slate-950/95 z-50 flex flex-col items-center justify-center gap-8">
            <button onclick="toggleMenu()" class="absolute top-6 left-6 text-white text-3xl">&times;</button>

            <a href="/" class="text-2xl font-bold text-white hover:text-indigo-400">Dashboard</a>
            <a href="/detail" class="text-2xl font-bold text-white hover:text-indigo-400">Detail Log</a>
            <a href="/visualizations" class="text-2xl font-bold text-white hover:text-indigo-400">Visualizations</a>
            <a href="/notes-feed" class="text-2xl font-bold text-white hover:text-indigo-400">Notes Feed</a>
            <a href="/settings" class="text-2xl font-bold text-white hover:text-indigo-400">Settings</a>

            <button onclick="handleLogout()" class="text-2xl font-bold text-rose-500 hover:text-rose-400 mt-8">Log Out</button>
        </div>
        <hr>
        <div id="dashboard-view" class="flex flex-col gap-4 pb-8 w-full">
            <div class="self-start">
                <h2 class="text-2xl font-bold">Dashboard</h2>
                <h4 id="welcome-box" class="text-slate-400 text-md pb-2" name="Raoul">Welcome back, Raoul!</h4>
                <div class="bg-slate-800 rounded-xl shadow-sm w-full py-3">
                    <p id="weather-display" class="justify-self-left">—</p>
                </div>
            </div>
            <div class="bg-slate-800 rounded-xl shadow-sm w-full p-3 ">
                <h3 class="justify-self-center text-lg">Mood</h3>
                <p id="mood-score" class="justify-self-center">—</p>
            </div>
            <div class="bg-slate-800 rounded-xl shadow-sm w-full p-3">
                <h3 class="justify-self-center text-lg">Energy</h3>
                <p id="energy-score" class="justify-self-center">—</p>
            </div>
            <div class="bg-slate-800 rounded-xl shadow-sm w-full p-3">
                <h3 class="justify-self-center text-lg">Stress</h3>
                <p id="stress-score" class="justify-self-center">—</p>
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="showView('quick-log-mood')" class="p-2 w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-bold rounded-2xl shadow-lg shadow-indigo-500/20 transition-all duration-200 flex items-center justify-center">⚡ Quick Log</button>
                <button onclick="window.location.href='/detail'" class="p-2 w-full bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-200 font-semibold rounded-2xl border border-slate-700 transition-all duration-200 flex items-center justify-center">📝 Detail Log</button>
            </div>
            <br>
            <div class="flex flex-row">
                <button id="delete-first" onclick="safetyCheck();" class="w-full p-1 bg-red-500 text-white font-bold rounded-2xl">❌ Reset Today's Entry</button>
                <span id="sure-check" class="hidden py-4 pr-4">Are you sure?</span><button id="delete-second" onclick="deleteEntry(this)" class="hidden p-4 bg-red-500 text-white font-bold rounded-2xl">Yes, reset entry!</button>
            </div>
        </div>

        <div id="quick-log-mood" style="display: none;">
            <div class="self-start">
                <h2 class="text-2xl font-bold pt-5">Quick Log</h2>
            </div>
            <div class="flex flex-col items-center p-5 gap-3">
                <label for="quick_mood" class="justify-center text-4xl text-center mb-2 pt-5 text-slate-300 drop-shadow-md">What's your mood today?</label><br>
                <button onclick="setMood(1)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">😭 Terrible</button>
                <button onclick="setMood(3)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">☹️ Bad</button>
                <button onclick="setMood(5)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">😐 Okay</button>
                <button onclick="setMood(7)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">🙂 Good</button>
                <button onclick="setMood(9)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">🤩 Excellent</button>
            </div>
        </div>
        <div id="quick-log-energy" style="display: none;">
            <div class="self-start">
                <h2 class="text-2xl font-bold pt-5">Quick Log</h2>
            </div>
            <div class="flex flex-col items-center p-5 gap-3">
                <label for="quick_energy" class="justify-center text-4xl text-center mb-2 pt-5 text-slate-300 drop-shadow-md">What's your energy today?</label><br>
                <button onclick="setEnergy(1)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">🔋 Exhausted</button>
                <button onclick="setEnergy(3)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">🪫 Low</button>
                <button onclick="setEnergy(5)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">🔌 Normal</button>
                <button onclick="setEnergy(7)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">⚡ High</button>
                <button onclick="setEnergy(9)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">🚀 Wired</button>
                <br>
                <button onclick="showView('quick-log-mood')" class="w-1/2 py-4 bg-slate-800 hover:bg-slate-700 text-center px-6 rounded-2xl transition-all">Go Back</button>
            </div>
        </div>
        <div id="quick-log-stress" style="display: none;">
            <div class="self-start">
                <h2 class="text-2xl font-bold pt-5">Quick Log</h2>
            </div>
            <div class="flex flex-col items-center p-5 gap-3">
                <label for="quick_stress" class="justify-center text-4xl text-center mb-2 pt-5 text-slate-300 drop-shadow-md">How's your stress today?</label><br>
                <button onclick="setStress(1)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">🧘 Relaxed</button>
                <button onclick="setStress(3)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">🍃 Calm</button>
                <button onclick="setStress(5)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">😬 Tense</button>
                <button onclick="setStress(7)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">😰 Stressed</button>
                <button onclick="setStress(9)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-left px-6 rounded-2xl transition-all">🤯 Overwhelmed</button>
                <br>
                <button onclick="showView('quick-log-energy')" class="w-1/2 py-4 bg-slate-800 hover:bg-slate-700 text-center px-6 rounded-2xl transition-all">Go Back</button>
            </div>
        </div>
        <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 flex items-center p-4 mb-4 w-full max-w-xs text-slate-100 bg-slate-800 rounded-2xl shadow-lg border border-slate-700 transition-all duration-300 opacity-0 pointer-events-none translate-y-4 z-50">
            <div id="toast-icon" class="inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-green-500/20 text-green-400 text-xl">
                ✅
            </div>
            <div id="toast-message" class="ml-3 text-sm font-semibold">Message goes here.</div>
        </div>
        <script>
            const SUPABASE_URL = "https://zjyypccuhagrsjbxfipi.supabase.co"
            const SUPABASE_ANON_KEY = "sb_publishable_AP_aE9BRhq4hzpNBbsRqNw_gxAoXF67"
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

            document.getElementById("hamburger-btn").addEventListener("click", toggleMenu);

            function showToast(message, isError = false) {
                const toast = document.getElementById("toast");
                const toastMessage = document.getElementById("toast-message");
                const toastIcon = document.getElementById("toast-icon");

                toastMessage.innerText = message;

                if (isError) {
                    toastIcon.className = "inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-red-500/20 text-red-400 text-xl";
                    toastIcon.innerHTML = "❌";
                } else {
                    toastIcon.className = "inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-green-500/20 text-green-400 text-xl";
                    toastIcon.innerHTML = "✅"
                }

                toast.classList.remove("opacity-0", "translate-y-4", "pointer-events-none");
                toast.classList.add("opacity-100", "translate-y-0")

                setTimeout(() => {
                    toast.classList.remove("opacity-100", "translate-y-0");
                    toast.classList.add("opacity-0", "translate-y-4", "pointer-events-none")
                }, 3000);
            }

            function showView(viewId) {
                document.getElementById('dashboard-view').style.display = 'none';
                document.getElementById('quick-log-mood').style.display = 'none';
                document.getElementById("quick-log-energy").style.display = "none";
                document.getElementById("quick-log-stress").style.display = "none";

                document.getElementById(viewId).style.display = 'block';

                const menu = document.getElementById("mobile-menu");
                menu.style.display = "";
                menu.classList.add("hidden");
            }

            let quickMood = 5;
            let quickEnergy = 5;
            let quickStress = 5;

            function setMood(value) {
                quickMood = value;
                showView("quick-log-energy");
            }

            function setEnergy(value) {
                quickEnergy = value;
                showView("quick-log-stress");
            }

            async function setStress(value) {
                const { data: { session } } = await supabaseClient.auth.getSession();

                if (!session) {
                    showToast("You must be logged in to save a log.", true)
                    return;
                }


                quickStress = value;
                const payload = {
                    mood: quickMood,
                    energy: quickEnergy,
                    stress: quickStress
                };

                fetch("/save-quick-log", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${session.access_token}`
                    },
                    body: JSON.stringify(payload)
                })
                .then(async response => {
                    const data = await response.json();

                    if (!response.ok) {
                        showToast(data.message, true);
                        throw new Error(data.message);
                    }

                    return data;
                })
                .then(data => {
                    console.log("Success:", data);
                    showToast("Entry saved successfully", false);
                    showView("dashboard-view");
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                    
                })
                .catch((error) => {
                    showToast(error.message, true);
                    setTimeout(() => {
                        window.location.reload();
                    }, 3000);
                });
            }

            async function getAverages () {
                const { data: { session }} = await supabaseClient.auth.getSession();

                if (!session) {
                    window.location.href = "/login";
                    return;    
                }

                fetch("/get-averages", {
                    method: "GET",
                    headers: {
                        "Authorization" : `Bearer ${session.access_token}`
                    }
                })
                .then(async response => {
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.message);
                    return data
                })
                .then(data => {
                    document.getElementById("mood-score").innerText = data["mood_score"];
                    document.getElementById("mood-score").className = `font-bold justify-self-center text-6xl ${getScoreColor("mood", data["mood_score"])}`
                    document.getElementById("energy-score").innerText = data["energy_score"];
                    document.getElementById("energy-score").className = `font-bold justify-self-center text-6xl ${getScoreColor("energy", data["energy_score"])}`
                    document.getElementById("stress-score").innerText = data["stress_score"];
                    document.getElementById("stress-score").className = `font-bold justify-self-center text-6xl ${getScoreColor("stress", data["stress_score"])}`
                })
                .catch(error => {
                    showToast("Error: " + error.message, true);
                });
            };

            async function getWeather() {
                const { data: { session } } = await supabaseClient.auth.getSession();

                if (!session) {
                    window.location.href = "/login";
                    return;

                }
                fetch("/get-weather", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${session.access_token}`
                    }
                })
                .then(async response => {
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.message);
                    return data
                })
                .then(data => {
                    document.getElementById("weather-display").innerText = data["weather"]
                })
                .catch(error => {
                    document.getElementById("weather-display").innerText = "Could not fetch weather data."
                    showToast("Error: " + error.message, true)
                })
            }

            function getScoreColor(type, score) {
                if (type === "stress") {
                    if (score >= 7) return "text-red-400 drop-shadow-[0_0_8px_rgba(248,113,113,0.4)]";
                    if (score >= 4) return "text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.3)]";
                    return "text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.3)]"
                } else {
                    if (score >= 7) return "text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.3)]";
                    if (score >= 4) return "text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.3)]";
                    return "text-red-400 drop-shadow-[0_0_8px_rgba(248,113,113,0.4)]"
                }
            }

            function toggleMenu() {
                const menu = document.getElementById("mobile-menu");
                menu.classList.toggle("hidden");
            }

            const deleteFirst = document.getElementById("delete-first");
            const safety = document.getElementById("sure-check");
            const deleteSecond = document.getElementById("delete-second");
            let deleteTimer;

            function safetyCheck() {
                let countdownLeft = 5;

                clearInterval(deleteTimer)

                deleteFirst.className = "w-full py-4 p-5 bg-red-500 text-white font-bold rounded-2xl hidden";
                safety.className = "py-4 pr-4";
                deleteSecond.className = "p-4 bg-red-500 text-white font-bold rounded-2xl";

                deleteTimer = setInterval(() => {
                    countdownLeft--;
                    if (countdownLeft <= 0) {
                        deleteFirst.className = "w-full py-4 p-5 bg-red-500 text-white font-bold rounded-2xl";
                        safety.className = "py-4 pr-4 hidden";
                        deleteSecond.className = "p-4 bg-red-500 text-white font-bold rounded-2xl hidden";

                        clearInterval(deleteTimer);
                    }
                }, 1000)
            }

            async function deleteEntry(buttonElement) {
                const { data: { session }} = await supabaseClient.auth.getSession();

                if (!session) {
                    window.location.href = "/login";
                    return;
                }

                buttonElement.innerText = "Deleting...";

                clearInterval(deleteTimer)

                fetch("/delete-entry", {
                    method: "DELETE",
                    headers: {
                        "Authorization": `Bearer ${session.access_token}`
                    }
                })
                .then(async response => {
                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message);
                    }
                    return data
                })
                .then(data => {
                    showToast("Today's entry has been completely reset.", false);
                    setTimeout(() => {
                        window.location.reload();
                    }, 3000);
                    
                })
                .catch(error => {
                    console.error("Error:", error);
                    showToast("Something went wrong: " + error.message, true);
                    setTimeout(()  => {
                        window.location.reload();
                    }, 3000);
                    
                });
            }

            async function getUserName() {
                const { data: { user }} = await supabaseClient.auth.getUser();
                if (user && user.user_metadata) {
                    const name = user.user_metadata.display_name;
                    document.getElementById("tracker-title").innerText = `${name}'s Tracker`
                    document.getElementById("welcome-box").innerText = `Welcome back, ${name}`
                }
            }

            window.addEventListener("DOMContentLoaded", () => {
                getAverages();
                getWeather();
                getUserName();
            })

            async function handleLogout() {
                try {
                    const { error } = await supabaseClient.auth.signOut();

                    if (error) throw error;

                    window.location.href = "/login";
                } catch (error) {
                    console.error("Error logging out: ", error.message);
                    showToast("Failed to log out: " + error.message, true)
                }
            }

        </script>
    </body>
</html>
