<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script>
            tailwind.config = {
                theme: {
                extend: {
                    fontFamily: {
                    sans: ['Montserrat', 'sans-serif'],
                    }
                }
                }
            }
            </script>
        <title>Mood Tracker</title>
    </head>
    <body class="bg-slate-900 text-slate-100 font-sans p-3">
        <nav class="flex p-4 items-center justify-between p-3 w-full bg-transparent relative top-0">
            <button id="hamburger-btn" class="flex flex-col gap-1.5 focus:outline-none top-0">
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
            </button>

            <span id="tracker-title" class="text-xs uppercase tracking-widest text-slate-500 font-bold">Your Tracker</span>

            <div class="w-6"></div>
        </nav>
        <div id="mobile-menu" class="hidden fixed inset-0 pt-3 bg-slate-950/95 z-50 flex flex-col items-center justify-center gap-8">
            <button onclick="toggleMenu()" class="absolute top-6 left-6 text-white text-3xl">&times;</button>

            <a href="/" class="text-2xl font-bold text-white hover:text-indigo-400">Dashboard</a>
            <a href="/detail" class="text-2xl font-bold text-white hover:text-indigo-400">Detail Log</a>
            <a href="/visualizations" class="text-2xl font-bold text-white hover:text-indigo-400">Visualizations</a>
            <a href="/notes-feed" class="text-2xl font-bold text-white hover:text-indigo-400">Notes Feed</a>
            <a href="/settings" class="text-2xl font-bold text-white hover:text-indigo-400">Settings</a>

            <button onclick="handleLogout()" class="text-2xl font-bold text-rose-500 hover:text-rose-400 mt-8">Log Out</button>
        </div>
        <hr>
        <div class="flex flex-col justify-center items-center gap-4">
            <div class="self-start">
                <h2 class="text-2xl font-bold pt-5">Available Logs</h2>
            </div>
            <div id="timestamp-container" class="bg-slate-800 rounded-xl shadow-sm p-6 w-full flex flex-col gap-3">
            </div>
        </div>
        <script type="module">
            import { supabaseClient } from "/static/js/supabaseConfig.js"
            import { handleLogout, toggleMenu, showToast, showError, updateBanner} from "/static/js/baseFunctions.js" 

            document.getElementById("hamburger-btn").addEventListener("click", toggleMenu);

            window.addEventListener("DOMContentLoaded", () =>{
                updateBanner();
            })

            async function getTimestamps() {
                const { data : { session }} = await supabaseClient.auth.getSession();

                if (!session) {
                    window.location.href = "/login";
                    return
                }

                try {
                    const response = await fetch("/get-timestamps", {
                        method: "GET",
                        headers: { "Authorization": `Bearer ${session.access_token}`}
                    });
                    if (!response.ok) {
                        const errorData = await response.json()
                        throw new Error("An error occured:" + errorData.message || "Could not load logs.")
                    }

                    const data = await response.json()
                    const timestampContainer = document.getElementById("timestamp-container")

                    data.logs.forEach(log => {
                        timestampContainer.innerHTML += `
                            <div class="bg-slate-700 justify-center items-center rounded-2xl p-3">
                                <button class="text-center" onclick="window.location.href = '/edit-log/${log.id}'">${log.date}</p>
                            </div>
                        `
                    })
                } catch (error) {
                    console.log(error)
                }
            }

            window.addEventListener("DOMContentLoaded", getTimestamps)

            window.toggleMenu = toggleMenu;
            window.handleLogout = handleLogout;
            window.showToast = showToast;
            window.showError = showError;
        </script>
    </body>
</html>
