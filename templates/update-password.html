<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script>
            tailwind.config = {
                theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] } } }
            }
        </script>
        <title>Password Reset - MoodTracker</title>
    </head>
    <body class="bg-slate-900 text-slate-100 font-sans h-screen flex flex-col items-center justify-center p-4">

        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold mb-2">Mood Tracker</h1>
            <p class="text-slate-400 text-sm tracking-widest uppercase font-semibold">Authentication</p>
        </div>

        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 backdrop-blur-sm w-full max-w-md shadow-xl">
            <div class="flex flex-col gap-4">
                
                <div id="auth-error" class="hidden bg-rose-500/10 text-rose-400 border border-rose-500/20 text-sm p-3 rounded-md text-center">
                    Error message goes here.
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-1">New Password</label>
                    <input type="password" id="password" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="you@email.com">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="••••••••">
                </div>

            </div>
        </div>
        <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 flex items-center p-4 mb-4 w-full max-w-xs text-slate-100 bg-slate-800 rounded-2xl shadow-lg border border-slate-700 transition-all duration-300 opacity-0 pointer-events-none translate-y-4 z-50">
            <div id="toast-icon" class="inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-green-500/20 text-green-400 text-xl">
                ✅
            </div>
            <div id="toast-message" class="ml-3 text-sm font-semibold">Message goes here.</div>
        </div>
        <script type="module">
            import { supabaseClient } from "/static/js/supabaseConfig.js"
            import { showToast } from "/static/js/baseFunctions.js"
            
            async function updateNewPassword() {
                const newPassword = document.getElementById("password").value
                const confirmPassword = document.getElementById("confirmPassword").value

                if (!newPassword || !confirmPassword) {
                    showToast("Please fill out both fields.", true);
                    return;
                }

                if (newPassword != confirmPassword) {
                    showToast("Please confirm that both passwords match.", true);
                    document.getElementById("confirmPassword").value = "";
                    return;
                }

                const { data, error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    showToast("Failed to update password: " + error.message, true);
                } else {
                    showToast("Password updated successfully!", false);
                    setTimeout(() => window.location.href = "/", 2000)
                }
            }
        </script>
    </body>
</html>
