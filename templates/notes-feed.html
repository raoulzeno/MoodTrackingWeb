<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                extend: {
                    fontFamily: {
                    // This tells Tailwind to replace its default "sans" font with our new Inter font
                    sans: ['Montserrat', 'sans-serif'],
                    }
                }
                }
            }
            </script>
        <title>Mood Tracker</title>
    </head>
    <body class="bg-slate-900 text-slate-100 font-sans p-4 pt-1">
        <nav class="flex items-center justify-between p-5 w-full bg-transparent relative top-0">
            <button id="hamburger-btn" onclick="toggleMenu()" class="flex flex-col gap-1.5 focus:outline-none top-0">
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
                <div class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-indigo-400"></div>
            </button>

            <span class="text-xs uppercase tracking-widest text-slate-500 font-bold">Raoul's Tracker</span>

            <div class="w-6"></div>
        </nav>
        <div id="mobile-menu" class="hidden fixed inset-0 bg-slate-950/95 z-50 flex flex-col items-center justify-center gap-8">
            <button onclick="toggleMenu()" class="absolute top-6 left-6 text-white text-3xl">&times;</button>

            <a href="/" class="text-2xl font-bold text-white hover:text-indigo-400">Dashboard</a>
            <a href="/detail" class="text-2xl font-bold text-white hover:text-indigo-400">Detail Log</a>
            <a href="/visualizations" class="text-2xl font-bold text-white hover:text-indigo-400">Visualizations</a>
            <a href="/notes-feed" class="text-2xl font-bold text-white hover:text-indigo-400">Notes Feed</a>
        </div>
        <hr>
        <div id="notes-feed" class="flex flex-col justify-center items-center gap-4">
            <div class="self-start">
                <h2 class="text-2xl font-bold pt-5">Notes Feed</h2>
                <span class="text-xs font-semibold text-indigo-400 uppercase tracking-widest">Live Feed</span>
            </div>
        </div>
        <script>
            function toggleMenu() {
                const menu = document.getElementById("mobile-menu");
                menu.classList.toggle("hidden");
            }

            async function initNodesFeed() {
                const container = document.getElementById("notes-feed")

                try {
                    const response = await fetch("/get-recent-notes")
                    const notes = await response.json();
                    if (notes.length === 0) {
                        container.innerHTML = `<p class="text-slate-500 italic text-center mt-10">No reflections logged yet...</p>`;
                        return;
                    }

                    container.innerHTML = notes.map(entry => `
                        <div class="relative pl-6 border-l-2 border-indigo-600/30 hover:border-indigo-500 transition-colors group">
                            <div class="absolute -left-[6px] top-1 w-[10px] h-[10px] rounded-full bg-slate-900 border-2 border-indigo-500 group-hover:scale-125 transition-transform"></div>
                            
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">${entry.timestamp}</span>
                                <div class="flex gap-2">
                                    <span class="text-[10px] px-2 py-0.5 rounded-full bg-indigo-500/10 text-indigo-300 border border-indigo-500/20">
                                        ${entry.emotion}
                                    </span>
                                </div>
                            </div>
                            
                            <p class="text-slate-300 text-sm leading-relaxed mb-2 font-medium">
                                "${entry.note}"
                            </p>
                            
                            <div class="flex gap-4 text-[10px] text-slate-500 font-bold uppercase">
                                <span>Mood: <span class="text-indigo-400">${entry.mood}/10</span></span>
                                <span>Energy: <span class="text-emerald-400">${entry.energy}/10</span></span>
                            </div>
                        </div>
                    `).join('');

                } catch (err) {
                    console.error("Error loading notes:", err);
                    container.innerHTML = `<p class="text-red-400 text-xs">Failed to load feed.</p>`;
                }
            }
        </script>
    </body>
</html>
